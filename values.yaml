# E ai Dev!
# Config repo do BFF rml-bff-BFF_PROJECT.
# Cada branch corresponde a um ambiente: homolog (teste) / main (produção)
#
# 'name'         → nome da aplicação
# 'service.port' → porta do BFF (padrão 8080)
# 'probes'       → health checks via /actuator/health
# 'configmap'    → variáveis de ambiente não-sensíveis
# Secrets (JWT_SECRET, etc.) gerenciados externamente (Sealed Secrets / External Secrets)

global:

  labels:
    ambiente: HOMOLOG
    dominio: BFF_DOMAIN
    projeto: BFF_PROJECT

  replicaCount: 1
  name: rml-bff-BFF_PROJECT

  strategy:
    rollingUpdate:
      maxSurge: 50%
      maxUnavailable: 0

  service:
    port: 8080

  probes:
    startupProbe:
      httpGet:
        path: "/actuator/health/liveness"
      initialDelaySeconds: 20
      failureThreshold: 10
      successThreshold: 1
      periodSeconds: 20
      timeoutSeconds: 10
    livenessProbe:
      httpGet:
        path: "/actuator/health/liveness"
      initialDelaySeconds: 20
      failureThreshold: 4
      successThreshold: 1
      periodSeconds: 20
      timeoutSeconds: 10
    readinessProbe:
      httpGet:
        path: "/actuator/health/readiness"
      initialDelaySeconds: 15
      failureThreshold: 10
      successThreshold: 1
      periodSeconds: 20
      timeoutSeconds: 10

  resources:
    limits:
      cpu: 500m
      memory: 512Mi
    requests:
      cpu: 250m
      memory: 256Mi

  autoscaling:
    enabled:
      cpu: true
      memory: false
      minReplicas: 1
      maxReplicas: 2
      targetCPUUtilizationPercentage: 80

  configmap:
    ENVIRONMENT: HOMOLOG
    SERVER_PORT: "8080"
    LOG_LEVEL: "INFO"
    # URLs dos SRVs chamados por este BFF via K8s service name
    # TODO: substituir pelo(s) SRV(s) real(is) que este BFF consome
    # Padrão do nome K8s: rml-srv-{dominio}-{projeto}
    # Exemplo: SRV_CLIENT_URL: "http://rml-srv-client-sovarais"
    SRV_DOMAIN_URL: "http://rml-srv-DOMAIN-PROJECT"
