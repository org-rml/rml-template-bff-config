name: Workflow Pull Request Check Config

on:
  pull_request:
    types: [opened, synchronize]
    branches:
      - staging
      - sandbox
      - production

jobs:
  helm-lint:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - name: Set up Helm
        uses: azure/setup-helm@v4

      - name: Lint Helm chart
        run: |
          helm lint . \
            --values values.yaml \
            --values values-version.yaml

      - name: Template dry-run
        run: |
          helm template . \
            --values values.yaml \
            --values values-version.yaml
